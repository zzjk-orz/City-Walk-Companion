<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>漫游 · CityWalk</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --accent: #8b4513;
    --gold: #c9a84c;
    --muted: #7a6a55;
    --card-bg: #faf7f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--gold);
    position: relative;
  }

  .header-top { display: flex; align-items: baseline; gap: 10px; }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .app-title-zh {
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 4px;
  }

  .location-status {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.active { background: #5a8a5a; animation: pulse 2s infinite; }
  .status-dot.error { background: #c0392b; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── 操作区：搜索框 + 按钮 ── */
  .controls {
    padding: 16px 24px 4px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    padding: 12px 14px;
    background: var(--card-bg);
    border: 1px solid var(--aged);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--muted); font-size: 13px; }

  .search-btn {
    padding: 12px 18px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .search-btn:hover:not(:disabled) { background: var(--accent); color: var(--paper); }
  .search-btn:disabled { opacity: 0.5; cursor: default; }

  .scan-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--paper);
    border: none;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-bottom: 8px;
  }

  .scan-btn:disabled { opacity: 0.5; cursor: default; }

  .divider-label {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .divider-label::before, .divider-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--aged);
  }

  .places-list { padding: 16px 24px 100px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--aged);
  }

  .place-card {
    background: var(--card-bg);
    border: 1px solid var(--aged);
    margin-bottom: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .place-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .place-card.active::before { transform: scaleY(1); }

  .place-card-header { padding: 16px 18px 12px; }

  .place-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .place-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .place-type {
    background: var(--aged);
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .story-area {
    padding: 0 18px 16px;
    border-top: 1px dashed var(--aged);
    margin-top: 4px;
  }

  .story-loading {
    padding-top: 14px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .loading-dots span {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: dot-bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .story-text {
    padding-top: 14px;
    font-size: 13.5px;
    line-height: 2;
    color: #2a1f10;
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
  }

  .story-text p { margin-bottom: 10px; }
  .story-text p:last-child { margin-bottom: 0; }

  .wiki-badge {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    border: 1px solid var(--aged);
    padding: 2px 8px;
  }

  .tts-btn {
    margin-top: 12px;
    padding: 6px 14px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--accent);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tts-btn:hover { background: var(--gold); color: var(--paper); }
  .tts-btn.speaking { background: var(--accent); color: var(--paper); }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

  .empty-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 2px;
    line-height: 2;
  }

  .error-banner {
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #fdf0ee;
    border: 1px solid #e8c8c4;
    font-size: 12px;
    color: #8b3a2a;
    line-height: 1.6;
  }

  /* 搜索来源标签 */
  .source-tag {
    display: inline-block;
    margin-bottom: 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--aged);
    padding-bottom: 4px;
  }

  .compare-link {
    display: block;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-decoration: none;
    border-top: 1px solid var(--aged);
    margin-top: 20px;
  }

  .compare-link:hover { color: var(--accent); }

  header::after {
    content: '漫';
    position: absolute;
    right: 24px; top: 24px;
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    color: var(--aged);
    line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="app-title">Wanderer</span>
    <span class="app-title-zh">漫游</span>
  </div>
  <div class="location-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">等待定位</span>
  </div>
</header>

<div class="controls">
  <!-- 地点搜索 -->
  <div class="search-row">
    <input
      class="search-input"
      id="searchInput"
      type="text"
      placeholder="搜索地点，如「故宫」「西雅图派克市场」"
      onkeydown="if(event.key==='Enter') searchPlace()"
    />
    <button class="search-btn" id="searchBtn" onclick="searchPlace()">搜索</button>
  </div>

  <div class="divider-label">或</div>

  <!-- GPS 探索 -->
  <button class="scan-btn" id="scanBtn" onclick="startScan()">探索附近</button>
</div>

<div class="places-list" id="placesList">
  <div class="empty-state">
    <div class="empty-icon">🧭</div>
    <div class="empty-text">搜索地点或点击探索附近<br>发现历史与故事</div>
  </div>
</div>

<script>
let currentSpeech = null;

// ── 定位 ──────────────────────────────────────────────────────────
async function getLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('浏览器不支持定位'));
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true, timeout: 10000
    });
  });
}

// ── API 调用 ──────────────────────────────────────────────────────
async function apiPost(body) {
  const res = await fetch('/api/places', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `服务错误: ${res.status}`);
  return data;
}

async function fetchNearbyPlaces(lat, lng) {
  const data = await apiPost({ action: 'nearby', lat, lng });
  return data.places;
}

async function geocodePlace(query) {
  return await apiPost({ action: 'geocode', query });
}

async function generateStory(place) {
  const data = await apiPost({
    action: 'story',
    place: {
      name: place.displayName?.text || place.name || '未知地点',
      address: place.formattedAddress || place.address || '',
      types: (place.types || []).join(', '),
      summary: place.editorialSummary?.text || place.summary || ''
    }
  });
  return data;
}

// ── 搜索地点 ──────────────────────────────────────────────────────
async function searchPlace() {
  const input = document.getElementById('searchInput');
  const query = input.value.trim();
  if (!query) return;

  const searchBtn = document.getElementById('searchBtn');
  const scanBtn = document.getElementById('scanBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const list = document.getElementById('placesList');

  searchBtn.disabled = true;
  searchBtn.textContent = '搜索中…';
  scanBtn.disabled = true;
  dot.className = 'status-dot';
  statusText.textContent = `搜索「${query}」`;
  list.innerHTML = '';

  try {
    // 1. 地名 → 坐标
    const geo = await geocodePlace(query);
    dot.className = 'status-dot active';
    statusText.textContent = geo.name;

    // 2. 坐标 → 附近景点
    const places = await fetchNearbyPlaces(geo.lat, geo.lng);
    renderPlaces(places, `「${geo.name}」附近`);
  } catch (err) {
    dot.className = 'status-dot error';
    statusText.textContent = '搜索失败';
    list.innerHTML = `<div class="error-banner">${err.message}</div>`;
  } finally {
    searchBtn.disabled = false;
    searchBtn.textContent = '搜索';
    scanBtn.disabled = false;
  }
}

// ── GPS 探索 ──────────────────────────────────────────────────────
async function startScan() {
  const scanBtn = document.getElementById('scanBtn');
  const searchBtn = document.getElementById('searchBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const list = document.getElementById('placesList');

  scanBtn.disabled = true;
  scanBtn.textContent = '定位中…';
  searchBtn.disabled = true;
  dot.className = 'status-dot';
  statusText.textContent = '获取位置中';
  list.innerHTML = '';

  try {
    const pos = await getLocation();
    const { latitude: lat, longitude: lng } = pos.coords;

    dot.className = 'status-dot active';
    statusText.textContent = `${lat.toFixed(4)}°N  ${Math.abs(lng).toFixed(4)}°`;
    scanBtn.textContent = '搜索中…';

    const places = await fetchNearbyPlaces(lat, lng);
    renderPlaces(places, '当前位置附近');
    scanBtn.textContent = '重新探索';
  } catch (err) {
    dot.className = 'status-dot error';
    const msg = err.code === 1 ? '位置权限被拒绝，请在浏览器设置中允许定位' : `错误：${err.message}`;
    statusText.textContent = '定位失败';
    list.innerHTML = `<div class="error-banner">${msg}</div>`;
    scanBtn.textContent = '重试';
  } finally {
    scanBtn.disabled = false;
    searchBtn.disabled = false;
  }
}

// ── 渲染地点列表 ──────────────────────────────────────────────────
function typeLabel(types) {
  const map = {
    historical_landmark: '历史地标', museum: '博物馆', church: '教堂',
    hindu_temple: '寺庙', mosque: '清真寺', synagogue: '犹太教堂',
    art_gallery: '艺术画廊', library: '图书馆',
    performing_arts_theater: '剧院', university: '大学', tourist_attraction: '景点'
  };
  for (const t of (types || [])) if (map[t]) return map[t];
  return '地点';
}

function renderPlaces(places, sourceLabel) {
  const list = document.getElementById('placesList');

  if (!places.length) {
    list.innerHTML = `<div class="error-banner">该区域800米内未找到历史文化地点，试试重新搜索或换个地点</div>`;
    return;
  }

  list.innerHTML = `
    <div class="source-tag">${sourceLabel}</div>
    <div class="section-label">发现 ${places.length} 处</div>
  `;

  places.forEach(place => {
    const name = place.displayName?.text || place.name || '未知地点';
    const address = place.formattedAddress || '';
    const type = typeLabel(place.types);
    const rating = place.rating ? `${place.rating} ★` : '';

    const card = document.createElement('div');
    card.className = 'place-card';
    card.innerHTML = `
      <div class="place-card-header">
        <div class="place-name">${name}</div>
        <div class="place-meta">
          <span class="place-type">${type}</span>
          ${rating ? `<span>${rating}</span>` : ''}
          <span>${address.split(',').slice(-2).join(',').trim()}</span>
        </div>
      </div>`;

    card.querySelector('.place-card-header').addEventListener('click', () => loadStory(place, card));
    list.appendChild(card);
  });

  list.innerHTML += `<a class="compare-link" href="/compare.html" target="_blank">↗ 多模型对比实验室</a>`;
}

// ── 故事加载 ──────────────────────────────────────────────────────
async function loadStory(place, card) {
  const existing = card.querySelector('.story-area');
  if (existing) {
    existing.remove();
    card.classList.remove('active');
    return;
  }

  card.classList.add('active');
  const storyArea = document.createElement('div');
  storyArea.className = 'story-area';
  storyArea.innerHTML = `
    <div class="story-loading">
      <span>正在召唤故事</span>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;
  card.appendChild(storyArea);

  try {
    const { story, wikiFound, redditFound } = await generateStory(place);
    const paragraphs = story.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
    const badges = [
      wikiFound ? '✦ Wikipedia' : '',
      redditFound ? '✦ Reddit 本地讨论' : '',
    ].filter(Boolean).join('　');
    storyArea.innerHTML = `
      <div class="story-text">${paragraphs}</div>
      ${badges ? `<span class="wiki-badge">${badges}</span>` : ''}
      <button class="tts-btn" onclick="speak(this.dataset.text, this)"
        data-text="${story.replace(/"/g, '&quot;')}" data-speaking="false">
        🔊 朗读
      </button>`;
  } catch (err) {
    storyArea.innerHTML = `<div class="story-text" style="color:var(--muted)">故事加载失败：${err.message}</div>`;
    card.classList.remove('active');
  }
}

// ── Google Cloud TTS ─────────────────────────────────────────────
let currentAudio = null;
let currentBtn = null;

async function speak(text, btn) {
  // 点同一个按钮 = 停止
  if (currentBtn === btn && currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    resetBtn(btn);
    currentAudio = null; currentBtn = null;
    return;
  }
  // 停掉其他
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  if (currentBtn && currentBtn !== btn) resetBtn(currentBtn);

  btn.textContent = '⏳ 加载中';
  btn.disabled = true;

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const audio = new Audio(`data:audio/mp3;base64,${data.audioContent}`);
    currentAudio = audio; currentBtn = btn;

    btn.classList.add('speaking');
    btn.textContent = '⏹ 停止';
    btn.disabled = false;

    audio.play();
    audio.onended = () => { resetBtn(btn); currentAudio = null; currentBtn = null; };
  } catch (err) {
    btn.textContent = '加载失败';
    setTimeout(() => resetBtn(btn), 2000);
    btn.disabled = false;
  }
}

function resetBtn(btn) {
  btn.classList.remove('speaking');
  btn.textContent = '🔊 朗读';
  btn.disabled = false;
}
</script>
</body>
</html>
